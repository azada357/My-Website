<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>AuroraTours - travel with us</title>
</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand text-uppercase" href="#">AuroraTours</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto ">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Packages</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">FAQ</a>
                    </li>


                </ul>



            </div>
        </div>
    </nav>

    <main>
        <div class="modal fade" tabindex="-1" id="booking-modal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Book a tour</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">


                        <form action="#">

                            <div class="row g-2">

                                <div class="col-sm-6">
                                    <div class="form-floating">
                                        <input id="email1" type="email" class="form-control"
                                            placeholder="Email address">

                                        <label for="email1">Email address</label>
                                    </div>
                                </div>




                                <div class="col-sm-6">
                                    <div class="form-floating">
                                        <select id="select1" class="form-select">
                                            <option> Tromso, Norway - $899 </option>
                                            <option> Reykjavik, Iceland - $999 </option>
                                            <option> Fairbanks, Alaska - $799 </option>
                                        </select>
                                        <label for="select1" class="form-label">Pick a tour</label>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">Checkout</button>
            </div>
        </div>
        </div>
        </div>

        <div id="hero-carousel" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-indicators">
                <button type="button" data-bs-target="#hero-carousel" data-bs-slide-to="0" class="active"
                    aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#hero-carousel" data-bs-slide-to="1"
                    aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#hero-carousel" data-bs-slide-to="2"
                    aria-label="Slide 3"></button>
            </div>

            <div class="carousel-inner">
                <div class="carousel-item active c-item">
                    <img src="./aurora-borealis-landscape-sea.jpg" class="d-block w-100 c-img" alt="Aurora Borealis ">
                    <div class="carousel-caption top-0 mt-4">
                        <p class="fs-3 mt-5 text-uppercase">Discover the Hidden World</p>
                        <h1 class="display-1 fw-bolder text-capitalize">The Aurora Tours</h1>
                        <button class="btn btn-primary px-4 py-2 ft-5 mt-5" data-bs-toggle="modal"
                            data-bs-target="#booking-modal">Book a tour</button>
                    </div>
                </div>

                <div class="carousel-item c-item">
                    <img src="./spectacular-aurora-borealis-display-winter-landscape.jpg" class="d-block w-100 c-img"
                        alt="Spectacular Aurora Borealis ">
                    <div class="carousel-caption top-0 mt-4">
                        <p class="fs-3 mt-5 text-uppercase">Spectacular Aurora Borealis</p>
                        <h1 class="display-1 fw-bolder text-capitalize">A Spectacular Display</h1>
                        <button class="btn btn-primary px-4 py-2 ft-5 mt-5" data-bs-toggle="modal"
                            data-bs-target="#booking-modal">Book a tour</button>
                    </div>
                </div>
                <div class="carousel-item c-item">
                    <img src="./northern-light-aurora-borealis-godafoss-waterfall-winter-iceland.jpg"
                        class="d-block w-100 c-img" alt="Northern Light Aurora Borealis">
                    <div class="carousel-caption top-0 mt-4">
                        <p class="fs-3 mt-5 text-uppercase">The Northern Lights</p>
                        <h1 class="display-1 fw-bolder text-capitalize">Go on an Aurora Adventure</h1>
                        <button class="btn btn-primary px-4 py-2 ft-5 mt-5" data-bs-toggle="modal"
                            data-bs-target="#booking-modal">Book a tour</button>
                    </div>
                </div>
            </div>


            <button class="carousel-control-prev" type="button" data-bs-target="#hero-carousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#hero-carousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </main>


    <footer> </footer>

</body>

</html>
